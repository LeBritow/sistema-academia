<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitFlow - Modo Treino</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #fff; padding: 20px; }
        h1 { color: #00d2ff; margin-bottom: 20px; text-align: center; }
        
        /* TELA DE LISTA */
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid #333; transition: 0.3s; }
        .card.concluido { border-left: 4px solid #27ae60; opacity: 0.7; }
        .exercicio-nome { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .btn-play { width: 100%; padding: 12px; background: #333; color: #00d2ff; border: 1px solid #00d2ff; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* TELA DE EXECUÇÃO (MODO FOCO) */
        #tela-foco { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 100; padding: 30px 20px; text-align: center; }
        #foco-nome { font-size: 26px; color: #00d2ff; margin-bottom: 10px; }
        #foco-serie { font-size: 16px; color: #aaa; margin-bottom: 30px; }
        #cronometro { font-size: 70px; font-weight: bold; margin: 30px 0; color: #fff; font-variant-numeric: tabular-nums; }
        
        /* BOTÕES DO CRONÔMETRO */
        .btn-acao { width: 80%; padding: 20px; border-radius: 50px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; color: white; transition: 0.3s; margin-bottom: 20px; }
        .btn-iniciar { background: #27ae60; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4); }
        .btn-parar { background: #e74c3c; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); }
        .btn-proximo { background: #f39c12; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4); }
        
        /* ÁREA DE DESCANSO E CARGA */
        #area-input { display: none; background: #1e1e1e; padding: 20px; border-radius: 12px; margin-top: 20px; }
        .input-carga { width: 80px; padding: 10px; font-size: 18px; text-align: center; border-radius: 6px; border: 1px solid #00d2ff; background: #121212; color: #fff; margin: 10px 0; }
        
        .btn-finalizar-geral { width: 100%; padding: 18px; background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%); border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; color: white;}
    </style>
</head>
<body>

    <div id="tela-lista">
        <h1 id="tituloTreino">Carregando Treino...</h1>
        <div id="listaExercicios"></div>
        
        <div class="card" style="margin-top: 20px; border-left: none;">
            <label style="color: #aaa; font-size: 14px;">Como foi o treino de hoje?</label>
            <textarea id="comentarioAluno" style="width: 100%; height: 80px; background: #2a2a2a; border: 1px solid #333; color: #fff; border-radius: 6px; margin-top: 10px; padding: 10px;" placeholder="Ex: Cansativo, mas bati recorde no supino!"></textarea>
        </div>
        
        <button class="btn-finalizar-geral" onclick="finalizarTreinoCompleto()">🏁 Finalizar & Salvar Histórico</button>
    </div>

    <div id="tela-foco">
        <h2 id="foco-nome">Nome do Exercício</h2>
        <div id="foco-serie">Série 1 de 3 | Meta: 12 reps - 20kg</div>
        
        <div id="cronometro">00:00</div>
        <div id="mensagem-status" style="color: #aaa; margin-bottom: 20px;">Preparado?</div>

        <button id="btn-acao" class="btn-acao btn-iniciar" onclick="acaoCronometro()">▶ Iniciar Série</button>

        <div id="area-input">
            <h3 style="color: #fff; font-size: 16px;">Descanso correndo... Carga utilizada:</h3>
            <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
                <input type="number" id="carga-usada" class="input-carga"> <span style="color:#aaa;">kg</span>
            </div>
            <p style="font-size: 12px; color: #777;">(Ajuste se você aumentou ou diminuiu o peso planejado)</p>
        </div>
    </div>

    <script>
        // VARIÁVEIS GLOBAIS
        const alunoId = localStorage.getItem('fitflow_aluno_id');
        let treinoIdAtual = 0;
        let exerciciosGlobais = [];
        let historicoRealizado = []; // Guarda o que o aluno realmente fez para mandar pro Java
        
        // ESTADO DO CRONÔMETRO
        let exAtivoIndex = -1;
        let serieAtual = 1;
        let timerInterval;
        let segundos = 0;
        let estadoTimer = 'PARADO'; // PARADO, TREINANDO, DESCANSANDO

        // 1. BUSCA OS DADOS DA API
        fetch(`http://localhost:8081/api/ficha?alunoId=${alunoId}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('tituloTreino').textContent = data.nomeTreino;
                treinoIdAtual = data.idFicha; 
                exerciciosGlobais = data.exercicios;
                renderizarLista();
            });

        // 2. DESENHA A LISTA INICIAL
        function renderizarLista() {
            const lista = document.getElementById('listaExercicios');
            lista.innerHTML = '';
            
            exerciciosGlobais.forEach((ex, index) => {
                let concluido = historicoRealizado.find(h => h.itemTreinoId === ex.idItem) ? true : false;
                
                lista.innerHTML += `
                    <div class="card ${concluido ? 'concluido' : ''}" id="card-${index}">
                        <div class="exercicio-nome">${ex.nomeExercicio} ${concluido ? '✅' : ''}</div>
                        <div style="color: #aaa; font-size: 13px;">${ex.series.length} séries planejadas | Descanso: ${ex.descanso}s</div>
                        ${!concluido ? `<button class="btn-play" onclick="abrirModoFoco(${index})">▶ Iniciar Exercício</button>` : ''}
                    </div>
                `;
            });
        }

        // 3. ABRE A TELA DE FOCO DE UM EXERCÍCIO
        function abrirModoFoco(index) {
            exAtivoIndex = index;
            serieAtual = 1;
            segundos = 0;
            estadoTimer = 'PARADO';
            
            atualizarTextosFoco();
            document.getElementById('cronometro').textContent = "00:00";
            document.getElementById('cronometro').style.color = "#fff";
            document.getElementById('area-input').style.display = 'none';
            
            let btn = document.getElementById('btn-acao');
            btn.className = "btn-acao btn-iniciar";
            btn.textContent = "▶ Iniciar Série " + serieAtual;

            document.getElementById('tela-lista').style.display = 'none';
            document.getElementById('tela-foco').style.display = 'block';
        }

        function atualizarTextosFoco() {
            let ex = exerciciosGlobais[exAtivoIndex];
            let serieInfo = ex.series[serieAtual - 1]; // Pega a série correspondente
            
            document.getElementById('foco-nome').textContent = ex.nomeExercicio;
            document.getElementById('foco-serie').textContent = `Série ${serieAtual} de ${ex.series.length} | Meta: ${serieInfo.reps} reps com ${serieInfo.carga}kg`;
            
            // Pré-preenche o input de carga com a carga planejada pelo instrutor
            document.getElementById('carga-usada').value = serieInfo.carga;
        }

        // 4. A MÁGICA DO BOTÃO CENTRAL
        function acaoCronometro() {
            let ex = exerciciosGlobais[exAtivoIndex];
            let btn = document.getElementById('btn-acao');
            let labelStatus = document.getElementById('mensagem-status');

            if (estadoTimer === 'PARADO') {
                // COMEÇOU A PUXAR FERRO
                estadoTimer = 'TREINANDO';
                segundos = 0;
                labelStatus.textContent = "Em execução... Foco!";
                document.getElementById('cronometro').style.color = "#fff";
                
                btn.className = "btn-acao btn-parar";
                btn.innerHTML = "⏹ Concluir Série " + serieAtual;
                
                timerInterval = setInterval(() => {
                    segundos++;
                    atualizarRelogio(segundos);
                }, 1000);

            } else if (estadoTimer === 'TREINANDO') {
                // TERMINOU A SÉRIE, COMEÇA O DESCANSO
                clearInterval(timerInterval);
                estadoTimer = 'DESCANSANDO';
                segundos = ex.descanso; // Pega o descanso automático do banco de dados
                labelStatus.textContent = "Recupere o fôlego!";
                document.getElementById('cronometro').style.color = "#f39c12";
                
                document.getElementById('area-input').style.display = 'block';
                
                btn.className = "btn-acao btn-proximo";
                btn.innerHTML = serieAtual < ex.series.length ? "⏭ Pular Descanso / Próxima" : "✅ Finalizar Exercício";
                
                timerInterval = setInterval(() => {
                    segundos--;
                    atualizarRelogio(segundos);
                    if(segundos <= 0) {
                        clearInterval(timerInterval);
                        document.getElementById('cronometro').textContent = "PRONTO!";
                    }
                }, 1000);

            } else if (estadoTimer === 'DESCANSANDO') {
                // VAI PARA A PRÓXIMA SÉRIE OU ENCERRA EXERCÍCIO
                clearInterval(timerInterval);
                
                // Antes de pular, salva a carga que ele informou para esta série
                let cargaInformada = parseFloat(document.getElementById('carga-usada').value);

                if (serieAtual < ex.series.length) {
                    serieAtual++;
                    estadoTimer = 'PARADO';
                    segundos = 0;
                    document.getElementById('cronometro').textContent = "00:00";
                    document.getElementById('cronometro').style.color = "#fff";
                    document.getElementById('area-input').style.display = 'none';
                    labelStatus.textContent = "Preparado?";
                    
                    btn.className = "btn-acao btn-iniciar";
                    btn.textContent = "▶ Iniciar Série " + serieAtual;
                    atualizarTextosFoco();
                } else {
                    // ACABOU TODAS AS SÉRIES DO EXERCÍCIO
                    historicoRealizado.push({
                        itemTreinoId: ex.idItem,
                        carga: cargaInformada, // Mandamos a carga da última série como registro final
                        feito: true
                    });
                    
                    document.getElementById('tela-foco').style.display = 'none';
                    document.getElementById('tela-lista').style.display = 'block';
                    renderizarLista(); // Re-renderiza para colocar o Check verdinho no card!
                }
            }
        }

        function atualizarRelogio(segs) {
            let m = Math.floor(Math.abs(segs) / 60).toString().padStart(2, '0');
            let s = (Math.abs(segs) % 60).toString().padStart(2, '0');
            document.getElementById('cronometro').textContent = `${m}:${s}`;
        }

        // 5. MANDA TUDO PRO SERVIDOR (COMO ANTES)
        async function finalizarTreinoCompleto() {
            const comentario = document.getElementById('comentarioAluno').value;
            
            const dados = {
                alunoId: parseInt(alunoId),
                treinoId: treinoIdAtual, 
                comentario: comentario || "Treino concluído.",
                itensRealizados: historicoRealizado // Array que fomos alimentando a cada exercício
            };

            try {
                const resposta = await fetch('http://localhost:8081/api/treino/finalizar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (resposta.ok) {
                    alert("Missão Cumprida! Dados salvos na ficha do professor.");
                    window.location.href = "index.html"; 
                }
            } catch (error) {
                alert("Erro de conexão!");
            }
        }
    </script>
</body>
</html>
